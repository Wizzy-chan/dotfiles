[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/base]
width = 100%
height = 24pt
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = Noto Sans CJK JP:style=Regular;2
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[bar/left]
inherit = bar/base
monitor = DisplayPort-1
modules-left = systray
modules-center = xwindow
modules-right = xworkspaces

[bar/right]
inherit = bar/base
monitor = HDMI-A-0
fixed-center = false
modules-left = xworkspaces
modules-center = player-ctl
modules-right = fs-rae fs-hinako pulseaudio memory cpu date

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:200:...%

[fs-base]
type = internal/fs
interval = 25
fixed-values = true
label-unmounted-foreground = ${colors.disabled}

[module/fs-rae]
inherit = fs-base
mount-0 = /
label-mounted = %{F#F0C674}rae%{F-} %used% / %total% (%free% free)
label-unmounted = rae not mounted

[module/fs-hinako]
inherit = fs-base
mount-0 = /nfs/media
label-mounted = %{F#F0C674}hinako%{F-} %used% / %total% (%free% free)
label-unmounted = hinako not mounted

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1

date = %a %h %d %R

label = %date%
label-foreground = ${colors.primary}

[module/player-ctl]
type = custom/script
exec = ~/.config/polybar/playerctl.sh
click-left = playerctl play-pause
tail = true

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
